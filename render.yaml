services:
  - type: web
    name: ai-investment-simulator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health
